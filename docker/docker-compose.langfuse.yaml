# Langfuse Self-Hosted Stack for Conductor
# ==========================================
# Usage:
#   docker compose -f docker/docker-compose.langfuse.yaml up -d
#   Open http://localhost:3001 to access Langfuse UI
#   Create a project, copy the API keys into config/conductor.secrets.yaml
#
# Or use Makefile shortcuts:
#   make langfuse-up
#   make langfuse-down
#   make langfuse-logs

services:
  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse-local
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse-local@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: conductor-langfuse-dev-secret
      NEXTAUTH_URL: http://localhost:3001
      SALT: conductor-langfuse-dev-salt
      TELEMETRY_ENABLED: "false"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  langfuse-db-data:
