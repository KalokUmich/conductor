# Langfuse Self-Hosted Stack for Conductor
# ==========================================
# Requires data tier to be running first:
#   make data-up
#
# Langfuse connects to the shared Postgres in the data tier
# (database: langfuse, created by docker/init-db.sql).
#
# Usage:
#   docker compose -f docker/docker-compose.langfuse.yaml up -d
#   make langfuse-up
#   make langfuse-down
#   make langfuse-logs

services:
  langfuse:
    image: langfuse/langfuse:2
    container_name: conductor-langfuse
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@conductor-postgres:5432/langfuse
      NEXTAUTH_SECRET: conductor-langfuse-dev-secret
      NEXTAUTH_URL: http://localhost:3001
      SALT: conductor-langfuse-dev-salt
      TELEMETRY_ENABLED: "false"
      HOSTNAME: "0.0.0.0"
      # Auto-provision user, org, project, and API keys on first startup.
      # After first run these are ignored (data persists in Postgres).
      # The public/secret keys MUST match conductor.secrets.yaml langfuse section.
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@conductor.dev}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Conductor Admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-conductor}
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-conductor-org}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-Conductor}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-conductor-project}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-Conductor}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-conductor-dev}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-conductor-dev}
    ports:
      - "3001:3000"
    networks:
      - conductor
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://$(hostname):3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  conductor:
    external: true
    name: conductor-net
