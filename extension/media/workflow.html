<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conductor Workflows</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                       */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ------------------------------------------------------------------ */
    /* Tab bar                                                            */
    /* ------------------------------------------------------------------ */
    .tab-bar {
      display: flex;
      gap: 2px;
      padding: 8px 16px 0;
      background: rgba(15, 20, 40, 0.95);
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
      flex-shrink: 0;
    }

    .tab {
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 6px 6px 0 0;
    }

    .tab:hover {
      color: #c4b5fd;
      background: rgba(139, 92, 246, 0.08);
    }

    .tab.active {
      color: #c4b5fd;
      border-bottom-color: #8b5cf6;
      background: rgba(139, 92, 246, 0.1);
    }

    /* ------------------------------------------------------------------ */
    /* Graph container                                                    */
    /* ------------------------------------------------------------------ */
    .graph-wrapper {
      flex: 1;
      position: relative;
      overflow: auto;
      padding: 24px;
    }

    .graph-container {
      position: relative;
      min-height: 600px;
    }

    /* SVG edge layer */
    .edge-layer {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      overflow: visible;
    }

    .edge-line {
      stroke: rgba(139, 92, 246, 0.35);
      stroke-width: 1.5;
      fill: none;
    }

    .edge-arrow {
      fill: rgba(139, 92, 246, 0.5);
    }

    .edge-label {
      fill: #94a3b8;
      font-size: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-anchor: middle;
    }

    /* ------------------------------------------------------------------ */
    /* Nodes                                                              */
    /* ------------------------------------------------------------------ */
    .node {
      position: absolute;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      z-index: 1;
    }

    .node:hover {
      transform: scale(1.04);
      z-index: 2;
    }

    .node-inner {
      background: rgba(15, 20, 40, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 10px;
      padding: 12px 18px;
      min-width: 140px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .node:hover .node-inner {
      box-shadow: 0 6px 24px rgba(139, 92, 246, 0.15);
    }

    .node.selected .node-inner {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.25), 0 6px 24px rgba(139, 92, 246, 0.2);
    }

    .node-label {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 2px;
    }

    .node-subtitle {
      font-size: 10px;
      color: #94a3b8;
      font-weight: 400;
    }

    /* -- Node type: start / end  (pill shape) -- */
    .node-type-start .node-inner,
    .node-type-end .node-inner {
      border-radius: 24px;
      min-width: 100px;
      padding: 10px 24px;
    }

    .node-type-start .node-inner {
      border-color: rgba(52, 211, 153, 0.4);
      background: rgba(16, 185, 129, 0.08);
    }

    .node-type-start .node-label { color: #6ee7b7; }

    .node-type-end .node-inner {
      border-color: rgba(248, 113, 113, 0.4);
      background: rgba(239, 68, 68, 0.08);
    }

    .node-type-end .node-label { color: #fca5a5; }

    /* -- Node type: explorer (violet accent) -- */
    .node-type-explorer .node-inner {
      border-color: rgba(139, 92, 246, 0.45);
      background: rgba(139, 92, 246, 0.06);
    }

    .node-type-explorer .node-label { color: #c4b5fd; }

    /* -- Node type: judge (indigo accent) -- */
    .node-type-judge .node-inner {
      border-color: rgba(196, 181, 253, 0.45);
      background: rgba(196, 181, 253, 0.06);
    }

    .node-type-judge .node-label { color: #e0d5ff; }

    /* -- Node type: classifier (diamond) -- */
    .node-type-classifier .node-inner {
      border-radius: 4px;
      transform: rotate(45deg);
      min-width: 80px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border-color: rgba(251, 191, 36, 0.45);
      background: rgba(251, 191, 36, 0.06);
    }

    .node-type-classifier .node-content {
      transform: rotate(-45deg);
      text-align: center;
    }

    .node-type-classifier .node-label { color: #fcd34d; font-size: 11px; }

    /* -- Node type: merge (compact) -- */
    .node-type-merge .node-inner {
      border-radius: 8px;
      min-width: 100px;
      padding: 8px 14px;
      border-color: rgba(56, 189, 248, 0.4);
      background: rgba(56, 189, 248, 0.06);
    }

    .node-type-merge .node-label { color: #7dd3fc; font-size: 12px; }

    /* -- Node type: delegate -- */
    .node-type-delegate .node-inner {
      border-color: rgba(251, 146, 60, 0.45);
      background: rgba(251, 146, 60, 0.06);
    }

    .node-type-delegate .node-label { color: #fdba74; }

    /* -- Node type: group (dashed border) -- */
    .node-type-group .node-inner {
      border-style: dashed;
      border-color: rgba(139, 92, 246, 0.25);
      background: rgba(139, 92, 246, 0.03);
      min-width: 200px;
      min-height: 80px;
    }

    .node-type-group .node-label { color: #a78bfa; font-size: 12px; }

    /* ------------------------------------------------------------------ */
    /* Detail sidebar                                                     */
    /* ------------------------------------------------------------------ */
    .detail-sidebar {
      position: fixed;
      top: 0;
      right: -380px;
      width: 360px;
      height: 100vh;
      background: rgba(12, 16, 30, 0.97);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(139, 92, 246, 0.2);
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.4);
      transition: right 0.25s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-sidebar.open {
      right: 0;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.12);
      flex-shrink: 0;
    }

    .detail-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #c4b5fd;
    }

    .detail-close {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      line-height: 0;
      transition: color 0.15s;
    }

    .detail-close:hover { color: #e2e8f0; }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
    }

    .detail-field {
      margin-bottom: 10px;
    }

    .detail-field-label {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 2px;
    }

    .detail-field-value {
      font-size: 13px;
      color: #e2e8f0;
    }

    .detail-badge {
      display: inline-block;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 12px;
      background: rgba(139, 92, 246, 0.12);
      color: #c4b5fd;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .detail-badge.badge-explorer { background: rgba(139, 92, 246, 0.12); color: #c4b5fd; border-color: rgba(139, 92, 246, 0.2); }
    .detail-badge.badge-judge    { background: rgba(196, 181, 253, 0.12); color: #e0d5ff; border-color: rgba(196, 181, 253, 0.2); }
    .detail-badge.badge-classifier { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border-color: rgba(251, 191, 36, 0.2); }
    .detail-badge.badge-start    { background: rgba(52, 211, 153, 0.12); color: #6ee7b7; border-color: rgba(52, 211, 153, 0.2); }
    .detail-badge.badge-end      { background: rgba(248, 113, 113, 0.12); color: #fca5a5; border-color: rgba(248, 113, 113, 0.2); }
    .detail-badge.badge-merge    { background: rgba(56, 189, 248, 0.12); color: #7dd3fc; border-color: rgba(56, 189, 248, 0.2); }
    .detail-badge.badge-delegate { background: rgba(251, 146, 60, 0.12); color: #fdba74; border-color: rgba(251, 146, 60, 0.2); }
    .detail-badge.badge-group    { background: rgba(139, 92, 246, 0.08); color: #a78bfa; border-color: rgba(139, 92, 246, 0.15); }

    .detail-tool-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .detail-tool-chip {
      padding: 2px 8px;
      font-size: 11px;
      color: #94a3b8;
      background: rgba(100, 116, 139, 0.12);
      border: 1px solid rgba(100, 116, 139, 0.15);
      border-radius: 4px;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    }

    .detail-instructions {
      font-size: 12px;
      line-height: 1.5;
      color: #94a3b8;
      background: rgba(15, 20, 40, 0.6);
      border: 1px solid rgba(100, 116, 139, 0.1);
      border-radius: 6px;
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 160px;
      overflow-y: auto;
    }

    /* ------------------------------------------------------------------ */
    /* Loading / error states                                             */
    /* ------------------------------------------------------------------ */
    .loading-state, .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: #94a3b8;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(139, 92, 246, 0.15);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state { color: #fca5a5; }

    .retry-btn {
      padding: 6px 16px;
      font-size: 12px;
      background: rgba(139, 92, 246, 0.15);
      color: #c4b5fd;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .retry-btn:hover {
      background: rgba(139, 92, 246, 0.25);
    }

    /* ------------------------------------------------------------------ */
    /* Legend                                                              */
    /* ------------------------------------------------------------------ */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(15, 20, 40, 0.8);
      border-top: 1px solid rgba(139, 92, 246, 0.1);
      flex-shrink: 0;
      font-size: 11px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #94a3b8;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-dot.dot-start    { background: #6ee7b7; }
    .legend-dot.dot-end      { background: #fca5a5; }
    .legend-dot.dot-explorer { background: #8b5cf6; }
    .legend-dot.dot-judge    { background: #c4b5fd; }
    .legend-dot.dot-classifier { background: #fbbf24; width: 8px; height: 8px; transform: rotate(45deg); border-radius: 1px; }
    .legend-dot.dot-merge    { background: #38bdf8; }
    .legend-dot.dot-delegate { background: #fb923c; }
  </style>
</head>
<body>
  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab active" data-workflow="pr-review">PR Review</button>
    <button class="tab" data-workflow="code-explorer">Code Explorer</button>
  </div>

  <!-- Graph area -->
  <div class="graph-wrapper" id="graph-wrapper">
    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <div>Loading workflow graph...</div>
    </div>
    <div id="error" class="error-state" style="display: none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <div id="error-text">Failed to load workflow</div>
      <button class="retry-btn" id="btn-retry">Retry</button>
    </div>
    <div class="graph-container" id="graph-container" style="display: none;"></div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><span class="legend-dot dot-start"></span> Start</div>
    <div class="legend-item"><span class="legend-dot dot-end"></span> End</div>
    <div class="legend-item"><span class="legend-dot dot-explorer"></span> Explorer</div>
    <div class="legend-item"><span class="legend-dot dot-judge"></span> Judge</div>
    <div class="legend-item"><span class="legend-dot dot-classifier"></span> Classifier</div>
    <div class="legend-item"><span class="legend-dot dot-merge"></span> Merge</div>
    <div class="legend-item"><span class="legend-dot dot-delegate"></span> Delegate</div>
  </div>

  <!-- Detail sidebar -->
  <div class="detail-sidebar" id="detail-sidebar">
    <div class="detail-header">
      <h2 id="detail-title">Node Details</h2>
      <button class="detail-close" id="btn-close-detail" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

  <script>
    // ----------------------------------------------------------------
    // VS Code API
    // ----------------------------------------------------------------
    const vscode = acquireVsCodeApi();
    let backendUrl = '';
    let currentWorkflow = 'pr-review';
    let graphData = null;
    let selectedNodeId = null;

    // Node dimensions used for edge routing
    const NODE_DEFAULTS = {
      start:      { w: 100, h: 40 },
      end:        { w: 100, h: 40 },
      classifier: { w: 80,  h: 80 },
      explorer:   { w: 160, h: 56 },
      judge:      { w: 160, h: 56 },
      merge:      { w: 110, h: 40 },
      delegate:   { w: 160, h: 56 },
      group:      { w: 220, h: 90 },
    };

    // ----------------------------------------------------------------
    // Request config from extension host
    // ----------------------------------------------------------------
    vscode.postMessage({ command: 'getConfig' });

    window.addEventListener('message', event => {
      const msg = event.data;
      if (msg.command === 'config' && msg.backendUrl) {
        backendUrl = msg.backendUrl;
        loadWorkflow(currentWorkflow);
      }
    });

    // ----------------------------------------------------------------
    // Tab switching
    // ----------------------------------------------------------------
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentWorkflow = tab.dataset.workflow;
        loadWorkflow(currentWorkflow);
      });
    });

    // ----------------------------------------------------------------
    // Retry button
    // ----------------------------------------------------------------
    document.getElementById('btn-retry').addEventListener('click', () => {
      loadWorkflow(currentWorkflow);
    });

    // ----------------------------------------------------------------
    // Close detail sidebar
    // ----------------------------------------------------------------
    document.getElementById('btn-close-detail').addEventListener('click', closeDetail);

    function closeDetail() {
      document.getElementById('detail-sidebar').classList.remove('open');
      if (selectedNodeId) {
        const prev = document.querySelector('.node.selected');
        if (prev) prev.classList.remove('selected');
        selectedNodeId = null;
      }
    }

    // ----------------------------------------------------------------
    // Fetch workflow graph
    // ----------------------------------------------------------------
    async function loadWorkflow(name) {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const container = document.getElementById('graph-container');

      loading.style.display = 'flex';
      error.style.display = 'none';
      container.style.display = 'none';
      closeDetail();

      if (!backendUrl) {
        showError('No backend URL configured');
        return;
      }

      try {
        const resp = await fetch(`${backendUrl}/api/workflows/${encodeURIComponent(name)}/graph`);
        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
        }
        graphData = await resp.json();
        renderGraph(graphData);
        loading.style.display = 'none';
        container.style.display = 'block';
      } catch (err) {
        showError(err.message || 'Failed to load workflow');
      }
    }

    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
      document.getElementById('error-text').textContent = message;
      document.getElementById('graph-container').style.display = 'none';
    }

    // ----------------------------------------------------------------
    // Render graph
    // ----------------------------------------------------------------
    function renderGraph(data) {
      const container = document.getElementById('graph-container');
      container.innerHTML = '';

      if (!data || !data.nodes || !data.edges) {
        showError('Invalid graph data');
        return;
      }

      const nodes = data.nodes;
      const edges = data.edges;

      // Compute bounding box for container sizing
      let maxX = 0, maxY = 0;
      nodes.forEach(n => {
        const dims = NODE_DEFAULTS[n.type] || NODE_DEFAULTS.explorer;
        const right = (n.position?.x || 0) + dims.w + 40;
        const bottom = (n.position?.y || 0) + dims.h + 40;
        if (right > maxX) maxX = right;
        if (bottom > maxY) maxY = bottom;
      });

      container.style.width = maxX + 60 + 'px';
      container.style.height = maxY + 60 + 'px';

      // Create SVG edge layer
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.classList.add('edge-layer');
      svg.setAttribute('width', maxX + 60);
      svg.setAttribute('height', maxY + 60);
      svg.style.width = (maxX + 60) + 'px';
      svg.style.height = (maxY + 60) + 'px';

      // Define arrowhead marker
      const defs = document.createElementNS(svgNS, 'defs');
      const marker = document.createElementNS(svgNS, 'marker');
      marker.setAttribute('id', 'arrowhead');
      marker.setAttribute('markerWidth', '8');
      marker.setAttribute('markerHeight', '6');
      marker.setAttribute('refX', '8');
      marker.setAttribute('refY', '3');
      marker.setAttribute('orient', 'auto');
      const arrowPath = document.createElementNS(svgNS, 'polygon');
      arrowPath.setAttribute('points', '0 0, 8 3, 0 6');
      arrowPath.classList.add('edge-arrow');
      marker.appendChild(arrowPath);
      defs.appendChild(marker);
      svg.appendChild(defs);

      // Build node position lookup for edge routing
      const nodeMap = {};
      nodes.forEach(n => {
        const dims = NODE_DEFAULTS[n.type] || NODE_DEFAULTS.explorer;
        nodeMap[n.id] = {
          cx: (n.position?.x || 0) + dims.w / 2,
          cy: (n.position?.y || 0) + dims.h / 2,
          w: dims.w,
          h: dims.h,
          x: n.position?.x || 0,
          y: n.position?.y || 0,
        };
      });

      // Draw edges
      edges.forEach(e => {
        const src = nodeMap[e.source];
        const tgt = nodeMap[e.target];
        if (!src || !tgt) return;

        // Compute edge endpoints on node boundaries
        const pts = computeEdgePoints(src, tgt);

        const path = document.createElementNS(svgNS, 'path');
        const dx = pts.tx - pts.sx;
        const dy = pts.ty - pts.sy;
        const midY = pts.sy + dy * 0.5;

        // Use a smooth cubic bezier for visual appeal
        const d = `M ${pts.sx} ${pts.sy} C ${pts.sx} ${midY}, ${pts.tx} ${midY}, ${pts.tx} ${pts.ty}`;
        path.setAttribute('d', d);
        path.classList.add('edge-line');
        path.setAttribute('marker-end', 'url(#arrowhead)');
        svg.appendChild(path);

        // Optional edge label
        if (e.label) {
          const text = document.createElementNS(svgNS, 'text');
          text.classList.add('edge-label');
          text.setAttribute('x', (pts.sx + pts.tx) / 2);
          text.setAttribute('y', midY - 6);
          text.textContent = e.label;
          svg.appendChild(text);
        }
      });

      container.appendChild(svg);

      // Render nodes
      nodes.forEach(n => {
        const el = createNodeElement(n);
        container.appendChild(el);
      });
    }

    // ----------------------------------------------------------------
    // Compute edge start/end at node boundary
    // ----------------------------------------------------------------
    function computeEdgePoints(src, tgt) {
      const angle = Math.atan2(tgt.cy - src.cy, tgt.cx - src.cx);

      // Source: exit from boundary
      const sx = src.cx + Math.cos(angle) * (src.w / 2);
      const sy = src.cy + Math.sin(angle) * (src.h / 2);

      // Target: enter at boundary (opposite direction)
      const tx = tgt.cx - Math.cos(angle) * (tgt.w / 2);
      const ty = tgt.cy - Math.sin(angle) * (tgt.h / 2);

      return { sx, sy, tx, ty };
    }

    // ----------------------------------------------------------------
    // Create a node DOM element
    // ----------------------------------------------------------------
    function createNodeElement(node) {
      const el = document.createElement('div');
      el.className = `node node-type-${node.type || 'explorer'}`;
      el.dataset.nodeId = node.id;
      el.style.left = (node.position?.x || 0) + 'px';
      el.style.top = (node.position?.y || 0) + 'px';

      const data = node.data || {};
      const label = data.label || node.id;

      let subtitle = '';
      if (node.type === 'explorer' && data.tool_count) {
        subtitle = data.tool_count + ' tools';
      } else if (node.type === 'judge') {
        subtitle = 'judge';
      } else if (node.type === 'classifier' && data.route_count) {
        subtitle = data.route_count + ' routes';
      } else if (node.type === 'delegate') {
        subtitle = 'delegate';
      } else if (node.type === 'merge') {
        subtitle = 'merge';
      }

      if (node.type === 'classifier') {
        // Diamond shape needs inner content rotation
        el.innerHTML = `
          <div class="node-inner">
            <div class="node-content">
              <div class="node-label">${escapeHtml(label)}</div>
              ${subtitle ? `<div class="node-subtitle">${escapeHtml(subtitle)}</div>` : ''}
            </div>
          </div>`;
      } else {
        el.innerHTML = `
          <div class="node-inner">
            <div class="node-label">${escapeHtml(label)}</div>
            ${subtitle ? `<div class="node-subtitle">${escapeHtml(subtitle)}</div>` : ''}
          </div>`;
      }

      // Click handler
      el.addEventListener('click', (ev) => {
        ev.stopPropagation();
        selectNode(node);
      });

      return el;
    }

    // ----------------------------------------------------------------
    // Node selection + detail sidebar
    // ----------------------------------------------------------------
    function selectNode(node) {
      // Deselect previous
      const prev = document.querySelector('.node.selected');
      if (prev) prev.classList.remove('selected');

      // Select new
      selectedNodeId = node.id;
      const el = document.querySelector(`.node[data-node-id="${node.id}"]`);
      if (el) el.classList.add('selected');

      // Populate detail sidebar
      const data = node.data || {};
      const sidebar = document.getElementById('detail-sidebar');
      const title = document.getElementById('detail-title');
      const body = document.getElementById('detail-body');

      title.textContent = data.label || node.id;

      let html = '';

      // Type badge
      const typeClass = 'badge-' + (node.type || 'explorer');
      html += `
        <div class="detail-section">
          <div class="detail-section-title">Type</div>
          <span class="detail-badge ${typeClass}">${escapeHtml(node.type || 'unknown')}</span>
        </div>`;

      // Model role
      if (data.model_role) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">Model Role</div>
            <div class="detail-field-value">${escapeHtml(data.model_role)}</div>
          </div>`;
      }

      // Budget weight
      if (data.budget_weight !== undefined && data.budget_weight !== null) {
        const pct = (data.budget_weight * 100).toFixed(0);
        html += `
          <div class="detail-section">
            <div class="detail-section-title">Budget Weight</div>
            <div class="detail-field-value">${pct}%</div>
          </div>`;
      }

      // Tool count
      if (data.tool_count) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">Tool Count</div>
            <div class="detail-field-value">${data.tool_count} tools available</div>
          </div>`;
      }

      // Tool list
      if (data.tools && Array.isArray(data.tools) && data.tools.length > 0) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">Tools</div>
            <ul class="detail-tool-list">
              ${data.tools.map(t => `<li class="detail-tool-chip">${escapeHtml(t)}</li>`).join('')}
            </ul>
          </div>`;
      }

      // Route count (classifier)
      if (data.route_count) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">Routes</div>
            <div class="detail-field-value">${data.route_count} routes</div>
          </div>`;
      }

      // Trigger conditions
      if (data.trigger) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">Trigger Conditions</div>
            <div class="detail-field-value">${escapeHtml(data.trigger)}</div>
          </div>`;
      }

      // Instructions (first ~200 chars)
      if (data.instructions) {
        const preview = data.instructions.length > 200
          ? data.instructions.substring(0, 200) + '...'
          : data.instructions;
        html += `
          <div class="detail-section">
            <div class="detail-section-title">Instructions</div>
            <div class="detail-instructions">${escapeHtml(preview)}</div>
          </div>`;
      }

      // Fallback: if no extra data at all, show the node ID
      if (!data.model_role && !data.tool_count && !data.budget_weight && !data.instructions && !data.trigger) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">Node ID</div>
            <div class="detail-field-value" style="font-family: monospace; font-size: 12px;">${escapeHtml(node.id)}</div>
          </div>`;
      }

      body.innerHTML = html;
      sidebar.classList.add('open');
    }

    // ----------------------------------------------------------------
    // Click on background to deselect
    // ----------------------------------------------------------------
    document.getElementById('graph-wrapper').addEventListener('click', (ev) => {
      if (ev.target.closest('.node')) return;
      closeDetail();
    });

    // ----------------------------------------------------------------
    // Utility
    // ----------------------------------------------------------------
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
