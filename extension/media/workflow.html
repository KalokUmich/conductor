<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conductor Workflows</title>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                       */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ------------------------------------------------------------------ */
    /* Tab bar                                                            */
    /* ------------------------------------------------------------------ */
    .tab-bar {
      display: flex;
      gap: 2px;
      padding: 8px 16px 0;
      background: rgba(15, 20, 40, 0.95);
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
      flex-shrink: 0;
    }

    .tab {
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 6px 6px 0 0;
    }

    .tab:hover { color: #c4b5fd; background: rgba(139, 92, 246, 0.08); }
    .tab.active { color: #c4b5fd; border-bottom-color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }

    /* ------------------------------------------------------------------ */
    /* Graph area                                                         */
    /* ------------------------------------------------------------------ */
    .graph-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    .graph-wrapper.panning { cursor: grabbing; }

    .graph-viewport {
      transform-origin: 0 0;
      will-change: transform;
      position: absolute;
      top: 0;
      left: 0;
    }

    .graph-container {
      position: relative;
    }

    /* SVG edge layer */
    .edge-layer {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      overflow: visible;
    }

    .edge-line {
      stroke: rgba(139, 92, 246, 0.4);
      stroke-width: 1.5;
      fill: none;
    }

    .edge-arrow { fill: rgba(139, 92, 246, 0.55); }

    .edge-label {
      fill: #94a3b8;
      font-size: 10px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-anchor: middle;
    }

    .edge-label-bg {
      fill: #0a0e1a;
      rx: 3;
      ry: 3;
    }

    /* ------------------------------------------------------------------ */
    /* Nodes                                                              */
    /* ------------------------------------------------------------------ */
    .node {
      position: absolute;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      z-index: 1;
    }

    .node:hover { transform: scale(1.04); z-index: 2; }

    .node-inner {
      background: rgba(15, 20, 40, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 10px;
      padding: 14px 22px;
      min-width: 180px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .node:hover .node-inner {
      box-shadow: 0 6px 24px rgba(139, 92, 246, 0.15);
    }

    .node.selected .node-inner {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.25), 0 6px 24px rgba(139, 92, 246, 0.2);
    }

    .node-label {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 2px;
      line-height: 1.3;
    }

    .node-subtitle {
      font-size: 10px;
      color: #94a3b8;
      font-weight: 400;
    }

    /* -- start / end (pill) -- */
    .node-type-start .node-inner,
    .node-type-end .node-inner {
      border-radius: 24px;
      min-width: 120px;
      padding: 10px 28px;
    }

    .node-type-start .node-inner {
      border-color: rgba(52, 211, 153, 0.4);
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.04) 100%);
    }
    .node-type-start .node-label { color: #6ee7b7; }

    .node-type-end .node-inner {
      border-color: rgba(248, 113, 113, 0.4);
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(239, 68, 68, 0.04) 100%);
    }
    .node-type-end .node-label { color: #fca5a5; }

    /* -- explorer (violet) -- */
    .node-type-explorer .node-inner {
      border-color: rgba(139, 92, 246, 0.45);
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.08) 0%, rgba(139, 92, 246, 0.03) 100%);
    }
    .node-type-explorer .node-label { color: #c4b5fd; }

    /* -- judge (indigo) -- */
    .node-type-judge .node-inner {
      border-color: rgba(196, 181, 253, 0.45);
      background: linear-gradient(135deg, rgba(196, 181, 253, 0.08) 0%, rgba(196, 181, 253, 0.03) 100%);
    }
    .node-type-judge .node-label { color: #e0d5ff; }

    /* -- classifier (hexagon) -- */
    .node-type-classifier .node-inner {
      clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
      border-radius: 0;
      border: none;
      min-width: 130px;
      min-height: 70px;
      padding: 18px 28px;
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.12) 0%, rgba(251, 191, 36, 0.05) 100%);
      /* Simulate border with box-shadow (clip-path clips border) */
      box-shadow: none;
    }
    .node-type-classifier .node-label { color: #fcd34d; font-size: 12px; }
    .node-type-classifier .node-subtitle { font-size: 10px; }

    /* Hex border via wrapper */
    .node-type-classifier::before {
      content: '';
      position: absolute;
      inset: -1px;
      clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
      background: rgba(251, 191, 36, 0.35);
      z-index: -1;
    }

    /* -- merge (compact) -- */
    .node-type-merge .node-inner {
      border-radius: 8px;
      min-width: 130px;
      padding: 10px 18px;
      border-color: rgba(56, 189, 248, 0.4);
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.08) 0%, rgba(56, 189, 248, 0.03) 100%);
    }
    .node-type-merge .node-label { color: #7dd3fc; font-size: 13px; }

    /* -- delegate (orange) -- */
    .node-type-delegate .node-inner {
      border-color: rgba(251, 146, 60, 0.45);
      background: linear-gradient(135deg, rgba(251, 146, 60, 0.08) 0%, rgba(251, 146, 60, 0.03) 100%);
    }
    .node-type-delegate .node-label { color: #fdba74; }

    /* ------------------------------------------------------------------ */
    /* Zoom controls                                                      */
    /* ------------------------------------------------------------------ */
    .zoom-controls {
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 2px;
      background: rgba(15, 20, 40, 0.92);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 8px;
      padding: 4px 6px;
      z-index: 50;
      backdrop-filter: blur(8px);
    }

    .zoom-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #94a3b8;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .zoom-btn:hover { background: rgba(139, 92, 246, 0.15); color: #c4b5fd; }

    .zoom-level {
      font-size: 11px;
      color: #64748b;
      min-width: 36px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    /* ------------------------------------------------------------------ */
    /* Detail sidebar                                                     */
    /* ------------------------------------------------------------------ */
    .detail-sidebar {
      position: fixed;
      top: 0;
      right: -380px;
      width: 360px;
      height: 100vh;
      background: rgba(12, 16, 30, 0.97);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(139, 92, 246, 0.2);
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.4);
      transition: right 0.25s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-sidebar.open { right: 0; }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.12);
      flex-shrink: 0;
    }
    .detail-header h2 { font-size: 15px; font-weight: 600; color: #c4b5fd; }

    .detail-close {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      line-height: 0;
      transition: color 0.15s;
    }
    .detail-close:hover { color: #e2e8f0; }

    .detail-body { flex: 1; overflow-y: auto; padding: 20px; }

    .detail-section { margin-bottom: 20px; }
    .detail-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
    }
    .detail-field-value { font-size: 13px; color: #e2e8f0; }

    .detail-badge {
      display: inline-block;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 12px;
      background: rgba(139, 92, 246, 0.12);
      color: #c4b5fd;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }
    .detail-badge.badge-explorer   { background: rgba(139, 92, 246, 0.12); color: #c4b5fd; border-color: rgba(139, 92, 246, 0.2); }
    .detail-badge.badge-judge      { background: rgba(196, 181, 253, 0.12); color: #e0d5ff; border-color: rgba(196, 181, 253, 0.2); }
    .detail-badge.badge-classifier { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border-color: rgba(251, 191, 36, 0.2); }
    .detail-badge.badge-start      { background: rgba(52, 211, 153, 0.12); color: #6ee7b7; border-color: rgba(52, 211, 153, 0.2); }
    .detail-badge.badge-end        { background: rgba(248, 113, 113, 0.12); color: #fca5a5; border-color: rgba(248, 113, 113, 0.2); }
    .detail-badge.badge-merge      { background: rgba(56, 189, 248, 0.12); color: #7dd3fc; border-color: rgba(56, 189, 248, 0.2); }
    .detail-badge.badge-delegate   { background: rgba(251, 146, 60, 0.12); color: #fdba74; border-color: rgba(251, 146, 60, 0.2); }

    .detail-tool-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .detail-tool-chip {
      padding: 2px 8px;
      font-size: 11px;
      color: #94a3b8;
      background: rgba(100, 116, 139, 0.12);
      border: 1px solid rgba(100, 116, 139, 0.15);
      border-radius: 4px;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    }
    .detail-instructions {
      font-size: 12px;
      line-height: 1.5;
      color: #94a3b8;
      background: rgba(15, 20, 40, 0.6);
      border: 1px solid rgba(100, 116, 139, 0.1);
      border-radius: 6px;
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 160px;
      overflow-y: auto;
    }

    /* ------------------------------------------------------------------ */
    /* Loading / error                                                    */
    /* ------------------------------------------------------------------ */
    .loading-state, .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: #94a3b8;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(139, 92, 246, 0.15);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state { color: #fca5a5; }
    .retry-btn {
      padding: 6px 16px;
      font-size: 12px;
      background: rgba(139, 92, 246, 0.15);
      color: #c4b5fd;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .retry-btn:hover { background: rgba(139, 92, 246, 0.25); }

    /* ------------------------------------------------------------------ */
    /* Legend                                                              */
    /* ------------------------------------------------------------------ */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(15, 20, 40, 0.8);
      border-top: 1px solid rgba(139, 92, 246, 0.1);
      flex-shrink: 0;
      font-size: 11px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; color: #94a3b8; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-dot.dot-start    { background: #6ee7b7; }
    .legend-dot.dot-end      { background: #fca5a5; }
    .legend-dot.dot-explorer { background: #8b5cf6; }
    .legend-dot.dot-judge    { background: #c4b5fd; }
    .legend-dot.dot-classifier { background: #fbbf24; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); border-radius: 0; }
    .legend-dot.dot-merge    { background: #38bdf8; }
    .legend-dot.dot-delegate { background: #fb923c; }
  </style>
</head>
<body>
  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab active" data-workflow="pr-review">PR Review</button>
    <button class="tab" data-workflow="code-explorer">Code Explorer</button>
  </div>

  <!-- Graph area -->
  <div class="graph-wrapper" id="graph-wrapper">
    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <div>Loading workflow graph...</div>
    </div>
    <div id="error" class="error-state" style="display: none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <div id="error-text">Failed to load workflow</div>
      <button class="retry-btn" id="btn-retry">Retry</button>
    </div>
    <div class="graph-viewport" id="graph-viewport">
      <div class="graph-container" id="graph-container" style="display: none;"></div>
    </div>
    <!-- Zoom controls -->
    <div class="zoom-controls" id="zoom-controls" style="display: none;">
      <button class="zoom-btn" id="btn-zoom-out" title="Zoom out">-</button>
      <span class="zoom-level" id="zoom-level">100%</span>
      <button class="zoom-btn" id="btn-zoom-in" title="Zoom in">+</button>
      <button class="zoom-btn" id="btn-fit" title="Fit to view" style="margin-left:2px; font-size:11px;">Fit</button>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><span class="legend-dot dot-start"></span> Start</div>
    <div class="legend-item"><span class="legend-dot dot-end"></span> End</div>
    <div class="legend-item"><span class="legend-dot dot-explorer"></span> Explorer</div>
    <div class="legend-item"><span class="legend-dot dot-judge"></span> Judge</div>
    <div class="legend-item"><span class="legend-dot dot-classifier"></span> Classifier</div>
    <div class="legend-item"><span class="legend-dot dot-merge"></span> Merge</div>
    <div class="legend-item"><span class="legend-dot dot-delegate"></span> Delegate</div>
  </div>

  <!-- Detail sidebar -->
  <div class="detail-sidebar" id="detail-sidebar">
    <div class="detail-header">
      <h2 id="detail-title">Node Details</h2>
      <button class="detail-close" id="btn-close-detail" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

  <script>
    // ================================================================
    // VS Code API + state
    // ================================================================
    const vscode = acquireVsCodeApi();
    let backendUrl = '';
    let currentWorkflow = 'pr-review';
    let graphData = null;
    let selectedNodeId = null;
    let dagreGraph = null;

    // Node dimension defaults (dagre uses these for layout)
    const NODE_DIMS = {
      start:      { w: 130, h: 44 },
      end:        { w: 130, h: 44 },
      classifier: { w: 140, h: 80 },
      explorer:   { w: 180, h: 64 },
      judge:      { w: 180, h: 64 },
      merge:      { w: 140, h: 44 },
      delegate:   { w: 180, h: 64 },
    };

    // ================================================================
    // Pan / Zoom state
    // ================================================================
    let vt = { x: 0, y: 0, s: 1 }; // view transform: translate x/y + scale
    let isPanning = false;
    let panStart = { x: 0, y: 0 };

    function applyTransform() {
      const vp = document.getElementById('graph-viewport');
      vp.style.transform = `translate(${vt.x}px, ${vt.y}px) scale(${vt.s})`;
      document.getElementById('zoom-level').textContent = Math.round(vt.s * 100) + '%';
    }

    function fitToView() {
      if (!dagreGraph) return;
      const wrapper = document.getElementById('graph-wrapper');
      const wr = wrapper.getBoundingClientRect();
      const gw = dagreGraph.graph().width || 800;
      const gh = dagreGraph.graph().height || 600;
      const pad = 60;
      const sx = (wr.width - pad * 2) / gw;
      const sy = (wr.height - pad * 2) / gh;
      vt.s = Math.min(sx, sy, 1.5);
      vt.x = (wr.width - gw * vt.s) / 2;
      vt.y = (wr.height - gh * vt.s) / 2;
      applyTransform();
    }

    // ================================================================
    // Pan / zoom event handlers
    // ================================================================
    const graphWrapper = document.getElementById('graph-wrapper');

    graphWrapper.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const newScale = Math.max(0.2, Math.min(4, vt.s * delta));
      const rect = graphWrapper.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const sd = newScale / vt.s;
      vt.x = mx - sd * (mx - vt.x);
      vt.y = my - sd * (my - vt.y);
      vt.s = newScale;
      applyTransform();
    }, { passive: false });

    graphWrapper.addEventListener('mousedown', (e) => {
      if (e.target.closest('.node') || e.target.closest('.zoom-controls')) return;
      isPanning = true;
      panStart = { x: e.clientX - vt.x, y: e.clientY - vt.y };
      graphWrapper.classList.add('panning');
    });
    window.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      vt.x = e.clientX - panStart.x;
      vt.y = e.clientY - panStart.y;
      applyTransform();
    });
    window.addEventListener('mouseup', () => {
      isPanning = false;
      graphWrapper.classList.remove('panning');
    });

    // Zoom controls
    document.getElementById('btn-zoom-in').addEventListener('click', () => {
      vt.s = Math.min(4, vt.s * 1.2);
      applyTransform();
    });
    document.getElementById('btn-zoom-out').addEventListener('click', () => {
      vt.s = Math.max(0.2, vt.s / 1.2);
      applyTransform();
    });
    document.getElementById('btn-fit').addEventListener('click', fitToView);

    // ================================================================
    // Config + tab switching
    // ================================================================
    vscode.postMessage({ command: 'getConfig' });

    window.addEventListener('message', event => {
      const msg = event.data;
      if (msg.command === 'config' && msg.backendUrl) {
        backendUrl = msg.backendUrl;
        loadWorkflow(currentWorkflow);
      }
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentWorkflow = tab.dataset.workflow;
        loadWorkflow(currentWorkflow);
      });
    });

    document.getElementById('btn-retry').addEventListener('click', () => loadWorkflow(currentWorkflow));
    document.getElementById('btn-close-detail').addEventListener('click', closeDetail);

    function closeDetail() {
      document.getElementById('detail-sidebar').classList.remove('open');
      if (selectedNodeId) {
        const prev = document.querySelector('.node.selected');
        if (prev) prev.classList.remove('selected');
        selectedNodeId = null;
      }
    }

    // ================================================================
    // Fetch workflow graph
    // ================================================================
    async function loadWorkflow(name) {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const container = document.getElementById('graph-container');
      const controls = document.getElementById('zoom-controls');

      loading.style.display = 'flex';
      error.style.display = 'none';
      container.style.display = 'none';
      controls.style.display = 'none';
      closeDetail();

      if (!backendUrl) { showError('No backend URL configured'); return; }

      try {
        const resp = await fetch(`${backendUrl}/api/workflows/${encodeURIComponent(name)}/graph`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
        graphData = await resp.json();
        renderGraph(graphData);
        loading.style.display = 'none';
        container.style.display = 'block';
        controls.style.display = 'flex';
        // Auto-fit after a frame so DOM is measured
        requestAnimationFrame(() => fitToView());
      } catch (err) {
        showError(err.message || 'Failed to load workflow');
      }
    }

    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
      document.getElementById('error-text').textContent = message;
      document.getElementById('graph-container').style.display = 'none';
      document.getElementById('zoom-controls').style.display = 'none';
    }

    // ================================================================
    // Render graph with dagre layout
    // ================================================================
    function renderGraph(data) {
      const container = document.getElementById('graph-container');
      container.innerHTML = '';

      if (!data || !data.nodes || !data.edges) { showError('Invalid graph data'); return; }
      if (typeof dagre === 'undefined') { showError('Layout library not loaded'); return; }

      // --- dagre layout ---
      const g = new dagre.graphlib.Graph();
      g.setGraph({
        rankdir: 'TB',
        nodesep: 60,
        ranksep: 80,
        edgesep: 20,
        marginx: 40,
        marginy: 40,
      });
      g.setDefaultEdgeLabel(() => ({}));

      // Add nodes
      data.nodes.forEach(n => {
        const d = NODE_DIMS[n.type] || NODE_DIMS.explorer;
        const w = (n.data && n.data.width) || d.w;
        const h = (n.data && n.data.height) || d.h;
        g.setNode(n.id, { width: w, height: h, nodeData: n });
      });

      // Add edges
      data.edges.forEach(e => {
        g.setEdge(e.source, e.target, { label: e.label || '', edgeData: e });
      });

      // Run layout
      dagre.layout(g);
      dagreGraph = g;

      // Size container
      const graphLabel = g.graph();
      const totalW = (graphLabel.width || 800) + 80;
      const totalH = (graphLabel.height || 600) + 80;
      container.style.width = totalW + 'px';
      container.style.height = totalH + 'px';

      // --- Draw edges (SVG layer) ---
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.classList.add('edge-layer');
      svg.setAttribute('width', totalW);
      svg.setAttribute('height', totalH);
      svg.style.width = totalW + 'px';
      svg.style.height = totalH + 'px';

      // Arrowhead marker
      const defs = document.createElementNS(svgNS, 'defs');
      const marker = document.createElementNS(svgNS, 'marker');
      marker.setAttribute('id', 'arrowhead');
      marker.setAttribute('markerWidth', '8');
      marker.setAttribute('markerHeight', '6');
      marker.setAttribute('refX', '8');
      marker.setAttribute('refY', '3');
      marker.setAttribute('orient', 'auto');
      const arrow = document.createElementNS(svgNS, 'polygon');
      arrow.setAttribute('points', '0 0, 8 3, 0 6');
      arrow.classList.add('edge-arrow');
      marker.appendChild(arrow);
      defs.appendChild(marker);
      svg.appendChild(defs);

      // Draw edges using dagre control points
      g.edges().forEach(edgeKey => {
        const edgeData = g.edge(edgeKey);
        if (!edgeData || !edgeData.points) return;

        const pts = edgeData.points;
        const path = document.createElementNS(svgNS, 'path');
        path.setAttribute('d', buildSmoothPath(pts));
        path.classList.add('edge-line');
        path.setAttribute('marker-end', 'url(#arrowhead)');
        svg.appendChild(path);

        // Edge label
        const label = edgeData.label || '';
        if (label) {
          const mid = pts[Math.floor(pts.length / 2)];
          // Background rect
          const bg = document.createElementNS(svgNS, 'rect');
          bg.classList.add('edge-label-bg');
          // Text first to measure
          const text = document.createElementNS(svgNS, 'text');
          text.classList.add('edge-label');
          text.setAttribute('x', mid.x);
          text.setAttribute('y', mid.y + 3);
          text.textContent = label;
          svg.appendChild(text);
          // Measure and add background
          try {
            const bbox = text.getBBox();
            bg.setAttribute('x', bbox.x - 4);
            bg.setAttribute('y', bbox.y - 1);
            bg.setAttribute('width', bbox.width + 8);
            bg.setAttribute('height', bbox.height + 2);
            svg.insertBefore(bg, text);
          } catch (e) { /* getBBox may fail if not rendered yet */ }
        }
      });

      container.appendChild(svg);

      // --- Draw nodes ---
      g.nodes().forEach(nodeId => {
        const layoutNode = g.node(nodeId);
        const nodeData = layoutNode.nodeData;
        const el = createNodeElement(nodeData);
        // dagre returns center coordinates; position top-left
        el.style.left = (layoutNode.x - layoutNode.width / 2) + 'px';
        el.style.top = (layoutNode.y - layoutNode.height / 2) + 'px';
        el.style.width = layoutNode.width + 'px';
        container.appendChild(el);
      });
    }

    // ================================================================
    // Smooth path through dagre control points
    // ================================================================
    function buildSmoothPath(points) {
      if (points.length < 2) return '';
      if (points.length === 2) {
        return `M ${points[0].x},${points[0].y} L ${points[1].x},${points[1].y}`;
      }
      // Quadratic bezier through intermediate points
      let d = `M ${points[0].x},${points[0].y}`;
      for (let i = 1; i < points.length - 1; i++) {
        const p = points[i];
        const next = points[i + 1];
        const mx = (p.x + next.x) / 2;
        const my = (p.y + next.y) / 2;
        d += ` Q ${p.x},${p.y} ${mx},${my}`;
      }
      const last = points[points.length - 1];
      d += ` L ${last.x},${last.y}`;
      return d;
    }

    // ================================================================
    // Create node DOM element
    // ================================================================
    function createNodeElement(node) {
      const el = document.createElement('div');
      el.className = `node node-type-${node.type || 'explorer'}`;
      el.dataset.nodeId = node.id;

      const data = node.data || {};
      const label = data.label || node.id;

      let subtitle = '';
      if (node.type === 'explorer' && data.tool_count) subtitle = data.tool_count + ' tools';
      else if (node.type === 'judge') subtitle = 'judge';
      else if (node.type === 'classifier' && data.route_count) subtitle = data.route_count + ' routes';
      else if (node.type === 'delegate') subtitle = 'delegate';
      else if (node.type === 'merge') subtitle = 'merge';

      el.innerHTML = `
        <div class="node-inner">
          <div class="node-label">${escapeHtml(label)}</div>
          ${subtitle ? `<div class="node-subtitle">${escapeHtml(subtitle)}</div>` : ''}
        </div>`;

      el.addEventListener('click', (ev) => {
        ev.stopPropagation();
        selectNode(node);
      });

      return el;
    }

    // ================================================================
    // Node selection + detail sidebar
    // ================================================================
    function selectNode(node) {
      const prev = document.querySelector('.node.selected');
      if (prev) prev.classList.remove('selected');

      selectedNodeId = node.id;
      const el = document.querySelector(`.node[data-node-id="${node.id}"]`);
      if (el) el.classList.add('selected');

      const data = node.data || {};
      const title = document.getElementById('detail-title');
      const body = document.getElementById('detail-body');
      title.textContent = data.label || node.id;

      let html = '';
      const typeClass = 'badge-' + (node.type || 'explorer');
      html += `<div class="detail-section"><div class="detail-section-title">Type</div><span class="detail-badge ${typeClass}">${escapeHtml(node.type || 'unknown')}</span></div>`;

      if (data.model_role) {
        html += `<div class="detail-section"><div class="detail-section-title">Model Role</div><div class="detail-field-value">${escapeHtml(data.model_role)}</div></div>`;
      }
      if (data.budget_weight !== undefined && data.budget_weight !== null) {
        html += `<div class="detail-section"><div class="detail-section-title">Budget Weight</div><div class="detail-field-value">${(data.budget_weight * 100).toFixed(0)}%</div></div>`;
      }
      if (data.tool_count) {
        html += `<div class="detail-section"><div class="detail-section-title">Tool Count</div><div class="detail-field-value">${data.tool_count} tools available</div></div>`;
      }
      if (data.tools && Array.isArray(data.tools) && data.tools.length > 0) {
        html += `<div class="detail-section"><div class="detail-section-title">Tools</div><ul class="detail-tool-list">${data.tools.map(t => `<li class="detail-tool-chip">${escapeHtml(t)}</li>`).join('')}</ul></div>`;
      }
      if (data.route_count) {
        html += `<div class="detail-section"><div class="detail-section-title">Routes</div><div class="detail-field-value">${data.route_count} routes</div></div>`;
      }
      if (data.trigger) {
        html += `<div class="detail-section"><div class="detail-section-title">Trigger Conditions</div><div class="detail-field-value">${escapeHtml(data.trigger)}</div></div>`;
      }
      if (data.instructions) {
        const preview = data.instructions.length > 300 ? data.instructions.substring(0, 300) + '...' : data.instructions;
        html += `<div class="detail-section"><div class="detail-section-title">Instructions</div><div class="detail-instructions">${escapeHtml(preview)}</div></div>`;
      }
      if (!data.model_role && !data.tool_count && !data.budget_weight && !data.instructions && !data.trigger) {
        html += `<div class="detail-section"><div class="detail-section-title">Node ID</div><div class="detail-field-value" style="font-family: monospace; font-size: 12px;">${escapeHtml(node.id)}</div></div>`;
      }

      body.innerHTML = html;
      document.getElementById('detail-sidebar').classList.add('open');
    }

    // Click background to deselect
    graphWrapper.addEventListener('click', (ev) => {
      if (ev.target.closest('.node') || ev.target.closest('.zoom-controls')) return;
      closeDetail();
    });

    // ================================================================
    // Utility
    // ================================================================
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
