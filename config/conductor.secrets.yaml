# Conductor Secrets — template with empty defaults (committed to git)
# =============================================================================
# DO NOT put real credentials here. This file is committed to git.
#
# To add your credentials:
#   1. Create conductor.secrets.local.yaml in this directory (gitignored)
#   2. Copy the sections you need and fill in real values
#   3. Local values are deep-merged on top of these defaults at load time
#
# Alternatively, use environment variables (highest priority):
#   CONDUCTOR_AWS_ACCESS_KEY_ID, CONDUCTOR_POSTGRES_PASSWORD, etc.
#   See backend/app/config.py _ENV_SECRETS_MAP for the full list.

# =============================================================================
# Database Credentials
# =============================================================================
# Must match docker/.env (POSTGRES_USER, POSTGRES_PASSWORD)
postgres:
  user: "conductor"
  password: "conductor"

# Redis (empty = no auth, default for local dev)
redis:
  password: ""

# =============================================================================
# AI Provider Credentials
# =============================================================================

ai_providers:
  # Anthropic API (Direct)
  # Get your API key from: https://console.anthropic.com/settings/keys
  anthropic:
    api_key: ""

  # AWS Bedrock
  # Create an IAM user with Bedrock access, or use SSO temporary credentials.
  # For SSO: run `aws sso login`, then copy credentials from ~/.aws/credentials
  aws_bedrock:
    access_key_id: ""
    secret_access_key: ""
    session_token: ""       # Required for SSO/STS temporary credentials
    region: "eu-west-2"

  # OpenAI API
  # Get your API key from: https://platform.openai.com/api-keys
  openai:
    api_key: ""

  # Alibaba Cloud DashScope (Qwen models, OpenAI-compatible)
  # Get your API key from: https://dashscope.console.aliyun.com/
  alibaba:
    api_key: ""
    # base_url defaults to Singapore. Other regions:
    #   Beijing:  https://dashscope.aliyuncs.com/compatible-mode/v1
    #   Virginia: https://dashscope-us.aliyuncs.com/compatible-mode/v1
    base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"

  # Moonshot AI (Kimi models, OpenAI-compatible)
  # Get your API key from: https://platform.moonshot.ai/
  moonshot:
    api_key: ""
    base_url: "https://api.moonshot.ai/v1"

# =============================================================================
# Google SSO
# =============================================================================
# Create OAuth app at: https://console.cloud.google.com/apis/credentials
google_sso:
  client_id: ""
  client_secret: ""

# =============================================================================
# Ngrok (VS Code Remote-WSL tunnel)
# =============================================================================
# Get authtoken from: https://dashboard.ngrok.com/get-started/your-authtoken
ngrok:
  authtoken: ""

# =============================================================================
# Langfuse Observability
# =============================================================================
# Dev defaults work with `make langfuse-up` (http://localhost:3001)
# Login: admin@conductor.dev / conductor
langfuse:
  public_key: "pk-lf-conductor-dev"
  secret_key: "sk-lf-conductor-dev"

# =============================================================================
# Jira Integration (Atlassian OAuth 2.0 3LO)
# =============================================================================
# Create app at: https://developer.atlassian.com/console/myapps/
# Required scopes: read:jira-work, write:jira-work, read:jira-user, offline_access
# Callback URL: {backend_url}/api/integrations/jira/callback
jira:
  client_id: ""
  client_secret: ""

# =============================================================================
# Atlassian read-only service account (Jira + Confluence, Basic auth)
# =============================================================================
# Classic API tokens are account-level — one token serves both products on the
# same Atlassian Cloud site. Used by the PR Brain's ticket-context enrichment
# (no user consent needed, runs server-side). Independent of the 3LO flow above.
# Create at: https://id.atlassian.com/manage-profile/security/api-tokens
# Env var overrides: CONDUCTOR_ATLASSIAN_READONLY_{SITE_URL,EMAIL,TOKEN}
atlassian_readonly:
  site_url: ""              # e.g. https://yourcompany.atlassian.net
  email: ""                 # service account email
  api_token: ""             # classic API token (not OAuth scoped token)
  webhook_token: ""         # shared secret for /api/webhooks/jira?token=...
                            # Phase 7.7.11 — site admin sets the same value
                            # in Atlassian Cloud → Settings → Webhooks.
                            # Empty means the webhook receiver returns 503.

# =============================================================================
# Microsoft Teams Bot (Bot Framework + Azure AD App Registration)
# =============================================================================
# Credentials come from the Azure AD App Registration created by IT/DevOps.
# - app_id:        "Application (client) ID" — also used as botId in the Teams manifest. Public.
# - app_password:  Client secret *Value* (shown once at creation; save immediately).
#                  Only used in Phase 2 for outbound Bot Framework + Graph API calls.
#                  Phase 1 leaves it empty — the router only logs incoming requests.
# - app_tenant_id: Azure AD tenant ID. Required when app_type == SingleTenant.
# - app_type:      "SingleTenant" (internal-only) or "MultiTenant".
# Env vars (override these values): CONDUCTOR_TEAMS_APP_{ID,PASSWORD,TENANT_ID,TYPE}.
teams:
  app_id: ""
  app_password: ""
  app_tenant_id: ""
  app_type: "SingleTenant"

# =============================================================================
# Azure DevOps Integration
# =============================================================================
# Create PAT at: Azure DevOps → User Settings → Personal Access Tokens
# Required scope: Code (Read & Write)
azure_devops:
  org_url: ""               # e.g. https://dev.azure.com/myorg
  pat: ""                   # Personal Access Token with Code Read & Write
