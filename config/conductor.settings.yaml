# Conductor Settings Configuration
# =============================================================================
# This file contains non-sensitive settings and CAN be committed to git.
# For API keys and secrets, use conductor.secrets.yaml (gitignored).
#
# Configuration file search order:
#   1. ./config/conductor.settings.yaml
#   2. ./conductor.settings.yaml
#   3. ../config/conductor.settings.yaml
#   4. ~/.conductor/conductor.settings.yaml

# =============================================================================
# Server Configuration
# =============================================================================
server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  reload: false
  log_level: "info"
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "vscode-webview://*"

  # Public URL for external access (set by ngrok or other tunnel service)
  # Leave empty to use localhost
  public_url: ""

# =============================================================================
# Ngrok Settings (non-secrets)
# =============================================================================
# Note: Ngrok authtoken is in conductor.secrets.yaml
ngrok:
  # Region (us, eu, ap, au, sa, jp, in)
  region: "eu"

  # Enable ngrok tunnel on startup
  enabled: true

# =============================================================================
# Database
# =============================================================================
database:
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  echo_sql: false

# =============================================================================
# Authentication
# =============================================================================
auth:
  token_expire_minutes: 60
  refresh_expire_days: 7
  require_email_verify: false

# =============================================================================
# Rooms
# =============================================================================
rooms:
  max_participants: 50
  max_rooms_per_user: 10
  session_timeout_minutes: 120
  enable_persistence: true

# =============================================================================
# Session Configuration
# =============================================================================
session:
  timeout_minutes: 0
  max_participants: 10

# =============================================================================
# Live Share (legacy — disabled, replaced by git_workspace)
# =============================================================================
live_share:
  enabled: false
  vscode_extension_id: "ms-vsliveshare.vsliveshare"
  host_timeout_seconds: 300

# =============================================================================
# AWS SSO Configuration
# =============================================================================
sso:
  enabled: true
  start_url: "https://d-9c67136d70.awsapps.com/start"
  region: "eu-west-2"

# =============================================================================
# Google SSO Configuration
# =============================================================================
google_sso:
  enabled: false

# =============================================================================
# AI Summary Configuration
# =============================================================================
summary:
  enabled: true
  default_model: "claude-sonnet-4-6-bedrock"

# =============================================================================
# AI Provider Settings
# =============================================================================
ai_provider_settings:
  anthropic_enabled: true
  aws_bedrock_enabled: true
  openai_enabled: true

# =============================================================================
# AI Models Configuration
# =============================================================================
ai_models:
  - id: "claude-sonnet-4-6-bedrock"
    provider: "aws_bedrock"
    model_name: "eu.anthropic.claude-sonnet-4-6"
    display_name: "Claude Sonnet 4.6 (Bedrock EU)"
    enabled: true

  - id: "claude-sonnet-4-5-bedrock"
    provider: "aws_bedrock"
    model_name: "eu.anthropic.claude-sonnet-4-5-20250929-v1:0"
    display_name: "Claude Sonnet 4.5 (Bedrock EU)"
    enabled: true

  - id: "claude-sonnet-4-anthropic"
    provider: "anthropic"
    model_name: "claude-sonnet-4-20250514"
    display_name: "Claude Sonnet 4 (Anthropic)"
    enabled: true

  - id: "claude-3-haiku-bedrock"
    provider: "aws_bedrock"
    model_name: "anthropic.claude-3-haiku-20240307-v1:0"
    display_name: "Claude 3 Haiku (Bedrock)"
    enabled: true

  - id: "qwen3-coder-next-bedrock"
    provider: "aws_bedrock"
    model_name: "qwen.qwen3-coder-next"
    display_name: "Qwen3 Coder Next (Bedrock EU)"
    enabled: true

  - id: "qwen3-next-80b"
    provider: "aws_bedrock"
    model_name: "qwen.qwen3-next-80b-a3b"
    display_name: "Qwen3 Next 80B (Bedrock EU)"
    enabled: true

  - id: "gpt-4o"
    provider: "openai"
    model_name: "gpt-4o"
    display_name: "GPT-4o"
    enabled: true

  - id: "gpt-4o-mini"
    provider: "openai"
    model_name: "gpt-4o-mini"
    display_name: "GPT-4o Mini"
    enabled: true

# =============================================================================
# Prompt Configuration
# =============================================================================
prompt:
  output_mode: "unified_diff"

# =============================================================================
# Change Limits Configuration
# =============================================================================
change_limits:
  max_files_per_request: 10
  max_lines_per_file: 500
  max_total_lines: 2000
  auto_apply:
    enabled: false
    max_lines: 50

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level: "info"
  audit_enabled: true
  audit_path: "backend/audit_logs.duckdb"

# =============================================================================
# Git Workspace Settings
# =============================================================================
git_workspace:
  enabled: true
  workspaces_dir: "./workspaces"
  git_auth_mode: "token"                   # "token" (Mode A) or "delegate" (Mode B)
  credential_ttl_seconds: 3600
  max_worktrees_per_repo: 20
  cleanup_on_room_close: true

# =============================================================================
# Code Search Settings
# =============================================================================
# Semantic code search powered by CocoIndex (AST-aware chunking + vector search).
#
# Embedding model uses LiteLLM format — supports 100+ providers with a single
# model string. Examples:
#
#   "sbert/sentence-transformers/all-MiniLM-L6-v2"  — local, free, no API key
#   "bedrock/cohere.embed-v4:0"       — AWS Bedrock Cohere (default)
#   "text-embedding-3-small"          — OpenAI
#   "voyage/voyage-code-3"            — Voyage AI (code-specialised)
#   "mistral/codestral-embed-2505"    — Mistral
#   "cohere/embed-english-v3.0"       — Cohere Direct
#   "gemini/text-embedding-004"       — Google Gemini
#   "ollama/nomic-embed-text"         — Ollama (local)
#
# Storage backend:
#   "sqlite"   — embedded, zero setup (default)
#   "postgres" — incremental processing, concurrent access, production-ready
#
# To switch providers, just change embedding_model and ensure the matching
# API key is in conductor.secrets.yaml. No other config changes needed.
code_search:
  enabled: true
  index_dir: "./cocoindex_data"

  # Embedding model (LiteLLM format — see examples above)
  embedding_model: "bedrock/cohere.embed-v4:0"

  # Storage backend for vector index
  storage_backend: "sqlite"                # "sqlite" | "postgres"
  # postgres_url: "postgresql://user:pass@localhost:5432/cocoindex"
  incremental: true                        # Only effective with postgres backend

  # Chunking / Search
  chunk_size: 512
  top_k_results: 5

  # RepoMap (graph-based context)
  repo_map_enabled: true
  repo_map_top_n: 10

  # ---------------------------------------------------------------------------
  # Reranking (post-retrieval re-scoring)
  # ---------------------------------------------------------------------------
  # Backend options:
  #   "none"           — No reranking (default, zero cost)
  #   "cohere"         — Cohere Rerank API (rerank-v3.5, $2/1K queries)
  #   "bedrock"        — AWS Bedrock Rerank (Cohere Rerank 3.5 on Bedrock)
  #   "cross_encoder"  — Local cross-encoder (free, ~80 MB, runs on CPU)
  rerank_backend: "none"
  rerank_top_n: 5
  rerank_candidates: 20
  cohere_rerank_model: "rerank-v3.5"
  bedrock_rerank_model_id: "cohere.rerank-v3-5:0"
  cross_encoder_model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
