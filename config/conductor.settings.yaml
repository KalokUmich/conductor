# Conductor Settings Configuration — safe defaults (committed to git)
# =============================================================================
# This file contains non-sensitive default settings.
#
# To override for your environment, create conductor.settings.local.yaml
# in the same directory (gitignored). Local values are deep-merged on top.
#
# For API keys and secrets, use conductor.secrets.yaml (gitignored).
#
# Load order:
#   1. conductor.settings.yaml           ← this file (defaults)
#   2. conductor.settings.local.yaml     ← your overrides (gitignored)
#   3. Environment variables             ← highest priority

# =============================================================================
# Server Configuration
# =============================================================================
server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  reload: false
  log_level: "info"
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://localhost:5173"
    - "vscode-webview://*"

  # Public URL for external access (set by ngrok or other tunnel service)
  # When ngrok is enabled, the live tunnel URL takes priority over this value.
  # Leave empty to use localhost (only works when NOT in VS Code Remote-WSL).
  public_url: ""

# =============================================================================
# Ngrok Settings (non-secrets)
# =============================================================================
# Note: Ngrok authtoken is in conductor.secrets.yaml
ngrok:
  # Region (us, eu, ap, au, sa, jp, in)
  region: "eu"

  # Enable ngrok tunnel on startup (set true in .local.yaml)
  enabled: false

# =============================================================================
# Database (legacy settings)
# =============================================================================
database:
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  echo_sql: false

# =============================================================================
# PostgreSQL (OLTP — credentials in conductor.secrets.yaml)
# Env var DATABASE_URL overrides the built URL entirely.
# =============================================================================
postgres:
  host: "localhost"
  port: 5432
  database: "conductor"
  pool_size: 10
  max_overflow: 20

# =============================================================================
# Redis (chat state — credentials in conductor.secrets.yaml)
# Env var REDIS_URL overrides the built URL entirely.
# =============================================================================
redis:
  host: "localhost"
  port: 6379
  db: 0
  prefix: "conductor:"

# =============================================================================
# Authentication
# =============================================================================
auth:
  token_expire_minutes: 60
  refresh_expire_days: 7
  require_email_verify: false

# =============================================================================
# Rooms
# =============================================================================
rooms:
  max_participants: 50
  max_rooms_per_user: 10
  session_timeout_minutes: 120
  enable_persistence: true

# =============================================================================
# AWS SSO Configuration
# =============================================================================
sso:
  enabled: false
  start_url: ""
  region: "eu-west-2"

# =============================================================================
# Google SSO Configuration
# =============================================================================
google_sso:
  enabled: false

# =============================================================================
# AI Summary Configuration
# =============================================================================
summary:
  enabled: true
  default_model: "claude-sonnet-4-6-bedrock"

# =============================================================================
# AI Provider Settings
# =============================================================================
ai_provider_settings:
  anthropic_enabled: true
  aws_bedrock_enabled: true
  openai_enabled: false
  alibaba_enabled: true
  moonshot_enabled: false

# =============================================================================
# AI Models Configuration
# =============================================================================
ai_models:
  # Verified with Converse API tool use (2026-04-03).
  #
  # Roles:
  #   brain    — orchestrator (needs strong reasoning + reliable tool calling)
  #   explorer — sub-agent (needs good instruction following + tool use, cost-efficient)
  #
  # The FIRST model with explorer: true becomes the default explorer.
  # Order matters — put the preferred default explorer at the top.

  # ---- Claude (Bedrock, cross-region EU) ----
  # Haiku: default explorer — fast, cheap ($0.80/1M in, $4/1M out), good tool use
  - id: "claude-haiku-4-5-bedrock"
    provider: "aws_bedrock"
    model_name: "eu.anthropic.claude-haiku-4-5-20251001-v1:0"
    display_name: "Claude Haiku 4.5 (Bedrock EU)"
    enabled: true
    explorer: true

  # Sonnet: strong brain — excellent reasoning + tool calling ($3/1M in, $15/1M out)
  - id: "claude-sonnet-4-6-bedrock"
    provider: "aws_bedrock"
    model_name: "eu.anthropic.claude-sonnet-4-6"
    display_name: "Claude Sonnet 4.6 (Bedrock EU)"
    enabled: true
    explorer: true    # fallback explorer when Haiku is unavailable

  # Opus: premium brain only — too expensive for sub-agent ($15/1M in, $75/1M out)
  - id: "claude-opus-4-6-bedrock"
    provider: "aws_bedrock"
    model_name: "eu.anthropic.claude-opus-4-6-v1"
    display_name: "Claude Opus 4.6 (Bedrock EU)"
    enabled: true
    # NOT explorer — reserved for Brain/PR review synthesis

  # ---- Claude (Anthropic Direct) ----
  - id: "claude-sonnet-4-6-anthropic"
    provider: "anthropic"
    model_name: "claude-sonnet-4-6-20250725"
    display_name: "Claude Sonnet 4.6 (Anthropic)"
    enabled: true

  # ---- DeepSeek (Bedrock) ----
  # V3.2: strong reasoning at low cost — good explorer
  - id: "deepseek-v3-bedrock"
    provider: "aws_bedrock"
    model_name: "deepseek.v3.2"
    display_name: "DeepSeek V3.2 (Bedrock)"
    enabled: true
    explorer: true

  # ---- Qwen (Bedrock) ----
  # Coder Next: latest Qwen coder, good for code exploration
  - id: "qwen3-coder-next-bedrock"
    provider: "aws_bedrock"
    model_name: "qwen.qwen3-coder-next"
    display_name: "Qwen3 Coder Next (Bedrock)"
    enabled: true
    explorer: true

  # Coder 480B: large MoE, strong code — but expensive for explorer
  - id: "qwen3-coder-480b-bedrock"
    provider: "aws_bedrock"
    model_name: "qwen.qwen3-coder-480b-a35b-v1:0"
    display_name: "Qwen3 Coder 480B (Bedrock)"
    enabled: true
    # NOT explorer — 480B MoE is expensive; use as Brain or on-demand

  # 235B MoE: good general-purpose but expensive for sub-agent
  - id: "qwen3-235b-bedrock"
    provider: "aws_bedrock"
    model_name: "qwen.qwen3-235b-a22b-2507-v1:0"
    display_name: "Qwen3 235B MoE (Bedrock)"
    enabled: true
    # NOT explorer — large MoE; available as Brain model

  # 32B: small, fast, but tool use quality is inconsistent
  - id: "qwen3-32b-bedrock"
    provider: "aws_bedrock"
    model_name: "qwen.qwen3-32b-v1:0"
    display_name: "Qwen3 32B (Bedrock)"
    enabled: true
    # NOT explorer — too weak for reliable sub-agent tool use

  # ---- Amazon Nova (Bedrock) ----
  # Nova Pro: decent all-around, low cost
  - id: "amazon-nova-pro-bedrock"
    provider: "aws_bedrock"
    model_name: "amazon.nova-pro-v1:0"
    display_name: "Amazon Nova Pro (Bedrock)"
    enabled: true
    explorer: true

  # Nova Micro: too weak for tool-use tasks
  - id: "amazon-nova-micro-bedrock"
    provider: "aws_bedrock"
    model_name: "amazon.nova-micro-v1:0"
    display_name: "Amazon Nova Micro (Bedrock)"
    enabled: true
    # NOT explorer — minimal capability, text-only

  # ---- Mistral (Bedrock) ----
  # Devstral: code specialist, strong for exploration
  - id: "devstral-bedrock"
    provider: "aws_bedrock"
    model_name: "mistral.devstral-2-123b"
    display_name: "Devstral 123B (Bedrock)"
    enabled: true
    explorer: true

  # ---- Moonshot Kimi (Bedrock) ----
  - id: "kimi-k2.5-bedrock"
    provider: "aws_bedrock"
    model_name: "moonshotai.kimi-k2.5"
    display_name: "Kimi K2.5 (Bedrock)"
    enabled: true
    explorer: true

  # ---- NVIDIA (Bedrock) ----
  # Nemotron 120B: strong reasoning but expensive for sub-agent
  - id: "nemotron-super-120b-bedrock"
    provider: "aws_bedrock"
    model_name: "nvidia.nemotron-super-3-120b"
    display_name: "Nemotron Super 120B (Bedrock)"
    enabled: true
    # NOT explorer — large model, use as Brain or on-demand

  # ---- Z.AI GLM (Bedrock) ----
  - id: "glm-5-bedrock"
    provider: "aws_bedrock"
    model_name: "zai.glm-5"
    display_name: "GLM-5 (Bedrock)"
    enabled: true
    explorer: true

  # ---- OpenAI ----
  - id: "gpt-4o"
    provider: "openai"
    model_name: "gpt-4o"
    display_name: "GPT-4o"
    enabled: true

  - id: "gpt-4o-mini"
    provider: "openai"
    model_name: "gpt-4o-mini"
    display_name: "GPT-4o Mini"
    enabled: true

  # ---- Alibaba / Qwen (DashScope, OpenAI-compatible) ----
  - id: "qwen3-max"
    provider: "alibaba"
    model_name: "qwen3-max"
    display_name: "Qwen3 Max (DashScope)"
    enabled: true

  - id: "qwen3.5-plus"
    provider: "alibaba"
    model_name: "qwen3.5-plus"
    display_name: "Qwen3.5 Plus (DashScope)"
    enabled: true
    explorer: true

  - id: "qwen3.5-flash"
    provider: "alibaba"
    model_name: "qwen3.5-flash"
    display_name: "Qwen3.5 Flash (DashScope)"
    enabled: true
    explorer: true

  - id: "qwen3-coder-plus"
    provider: "alibaba"
    model_name: "qwen3-coder-plus"
    display_name: "Qwen3 Coder Plus (DashScope)"
    enabled: true

  - id: "qwen3-coder-flash"
    provider: "alibaba"
    model_name: "qwen3-coder-flash"
    display_name: "Qwen3 Coder Flash (DashScope)"
    enabled: true

    explorer: true

  # ---- Kimi (via Alibaba DashScope) ----
  - id: "kimi-k2.5"
    provider: "alibaba"
    model_name: "kimi-k2.5"
    display_name: "Kimi K2.5 (DashScope)"
    enabled: true
    explorer: true

  # ---- Moonshot / Kimi (OpenAI-compatible, direct) ----
  - id: "kimi-k2.5-moonshot"
    provider: "moonshot"
    model_name: "kimi-k2.5"
    display_name: "Kimi K2.5 (Moonshot)"
    enabled: true

  - id: "kimi-k2-thinking-moonshot"
    provider: "moonshot"
    model_name: "kimi-k2-thinking"
    display_name: "Kimi K2 Thinking (Moonshot)"
    enabled: true

# =============================================================================
# Prompt Configuration
# =============================================================================
prompt:
  output_mode: "unified_diff"

# =============================================================================
# Change Limits Configuration
# =============================================================================
change_limits:
  max_files_per_request: 10
  max_total_lines: 2000
  auto_apply:
    max_lines: 50

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  audit_enabled: true
  audit_path: "backend/audit_logs.db"

# =============================================================================
# Git Workspace Settings
# =============================================================================
git_workspace:
  enabled: true
  workspaces_dir: "./workspaces"
  git_auth_mode: "token"                   # "token" (Mode A) or "delegate" (Mode B)
  credential_ttl_seconds: 3600
  max_worktrees_per_repo: 20
  cleanup_on_room_close: true

# =============================================================================
# Session Trace Settings
# =============================================================================
# Records per-query metrics (tokens, latencies, tool calls) for offline analysis.
# Run for a few days, then analyze with AI to optimize prompts and tool usage.
trace:
  enabled: true
  backend: "database"                       # "local" (JSON files) or "database" (Postgres)
  local_path: ".conductor/session_traces"   # fallback when database is unavailable

# =============================================================================
# Langfuse Observability
# =============================================================================
# Self-hosted Langfuse via: make langfuse-up  (http://localhost:3001)
# User/org/project are auto-provisioned on first startup (see docker/.env).
# Dev defaults — add these to conductor.secrets.yaml:
#   langfuse:
#     public_key: "pk-lf-conductor-dev"
#     secret_key: "sk-lf-conductor-dev"
langfuse:
  enabled: true
  host: "http://localhost:3001"

# =============================================================================
# Jira Integration
# =============================================================================
# Atlassian OAuth 2.0 (3LO) for Jira Cloud.
# Create an OAuth 2.0 app at https://developer.atlassian.com/console/myapps/
# Set callback URL to: {your_backend_url}/api/integrations/jira/callback
azure_devops:
  enabled: false
  project: ""
  repo_url: ""

jira:
  enabled: false
  # Override in conductor.settings.local.yaml with:
  #   enabled: true, branch_formats, allowed_projects, teams
  # Secrets (client_id, client_secret) go in conductor.secrets.yaml