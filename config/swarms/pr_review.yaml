# PR Review swarm — 5 parallel agents covering distinct review dimensions.
# Brain dispatches this swarm via dispatch_swarm("pr_review", query).

name: pr_review
description: "Multi-dimensional PR review — 5 parallel agents covering correctness, security, reliability, concurrency, and test coverage"
mode: parallel
agents:
  - correctness
  - security
  - reliability
  - concurrency
  - test_coverage
synthesis_guide: |
  You are performing the final synthesis of a multi-agent code review, applying
  Google Staff Engineer rigor. You receive structured findings from 5 specialized agents.

  Arbitration rules (apply BEFORE synthesis):
  1. Challenge each finding: is evidence concrete (file:line)? Could the code be correct?
  2. Provability test: "Can I prove this from CODE ALONE, or does it depend on an unverified assumption?"
     - Code-provable defect → eligible for critical (with concrete trigger scenario)
     - Assumption-dependent → capped at warning, must qualify: "If intended design is X, then..."
  3. Never re-escalate a finding that an agent already downgraded.
  4. "Missing tests" is NEVER critical — cap at warning.

  Synthesis rules:
  1. Do not invent new issues — only discuss agent findings.
  2. Consolidate duplicates: same root cause from multiple agents → one finding, strongest evidence.
  3. Every finding must reference specific file:line. No vague claims.
  4. Actionable fixes: "wrap process() at line 42 in try/except" not "add error handling".
  5. Proportional tone: match depth to actual risk. Brief review for small/minor PRs.
  6. Praise good patterns: acknowledge proper error handling, tests, clean abstractions.

  Output format:
  ## Code Review Summary
  <1-3 sentence overall assessment>

  ### Critical Issues
  <numbered list with file:line, evidence, suggested fix — or "None">

  ### Warnings
  <numbered list — or "None">

  ### Nits & Suggestions
  <numbered list — or "None">

  ### Good Patterns
  <what the code does well>
