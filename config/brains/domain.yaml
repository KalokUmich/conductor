# Domain Brain — specialized Brain for business / domain logic questions.
#
# Activated via transfer_to_brain("domain") from the General Brain when the
# query asks about end-to-end flows, business features, or "how does X work"
# in domain terms (e.g. "After Render approval, what happens to the customer").
#
# Architecture:
#   Phase 1  Coordinator self-survey (calls code tools directly)
#            ├─ Read project docs (CLAUDE.md, README.md) for vocabulary
#            ├─ list_files / module_summary to map relevant sub-modules
#            ├─ grep domain keywords to anchor on domain models
#            └─ Output a ScopePlan in coordinator's own thinking
#   Phase 2  Dispatch (parallel dispatch_explore calls — DEPTH or BREADTH)
#            └─ Workers return prose findings + optional semi-structured JSON
#   Phase 3  Synthesis (coordinator's final answer applies 8 rules + 4 sections)
#
# Unlike PR Brain v2, scope is NOT pre-known — the coordinator has to discover
# it by reading docs and grep'ing. So Phase 1 is LLM-driven, not deterministic.

name: domain
description: "Domain logic Brain — coordinator self-surveys scope, then dispatches workers from depth/breadth angles, then synthesises with preserve-specifics rules."
model: strong

limits:
  max_iterations: 25                # coord loops: ~5 survey + 1-3 dispatch + 1 synthesis + buffer
  budget_tokens: 200000             # coordinator's own pool (survey reads can be chunky)
  total_session_tokens: 1000000     # coord + workers combined
  max_concurrent_agents: 3
  sub_agent_timeout: 300
  max_depth: 2                      # Coord(0) → Worker(1) → sub-worker(2)

# Tools the COORDINATOR sees directly (Phase 1 self-survey + Phase 2 dispatch).
# Read-only + structural exploration only. Workers get their own broader tool set
# via dispatch_explore (template mode pulls from agent .md frontmatter; dynamic
# mode lets the coordinator pick).
core_tools:
  - read_file
  - list_files
  - glob
  - grep
  - file_outline
  - module_summary
  - find_symbol
  - find_references
  - get_dependencies
  # `dispatch_explore` is added automatically by AgentToolExecutor as a Brain meta-tool.

# Synthesis budget hint (the coordinator caps its own final-answer output here).
synthesis:
  max_output_tokens: 4096
