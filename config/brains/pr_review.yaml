# PR Brain — specialized Brain orchestrator for PR reviews.
#
# Drives the v2 "agent-as-tool" coordinator loop: ONE Brain (Sonnet)
# surveys the PR, dispatches scope-bounded sub-agents via
# ``dispatch_verify``, replans on unexpected observations, and
# synthesises. Sub-agent roles are composed on the fly from templates
# in ``config/agent_factory/`` — no fixed fleet list lives here.

name: pr_review
description: "PR review Brain — coordinator-worker loop with role-based dispatch"
model: strong

limits:
  total_session_tokens: 2500000
  max_concurrent_agents: 6
  llm_concurrency_limit: 2          # Max parallel LLM API calls (Bedrock throttle guard)
  sub_agent_timeout: 600
  reject_above: 6000
  max_depth: 2
  small_pr_threshold: 100           # Size hint used by the coordinator prompt

# Deterministic post-processing settings (shared: dedup + ranking + filter)
post_processing:
  min_confidence: 0.80
  max_findings: 10
  max_findings_per_agent: 5

# Synthesis LLM call settings
synthesis:
  max_tokens: 4096                  # Max output tokens for final review markdown
  max_diff_chars: 30000             # Total diff chars cap in synthesis prompt
  max_diff_snippet_chars: 4000      # Per-file diff snippet cap
