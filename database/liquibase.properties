# Liquibase configuration for Conductor
#
# Usage:
#   make db-update          Run pending changesets
#   make db-status          Show pending changesets
#   make db-rollback-one    Rollback last changeset
#
# Overrides:
#   Environment variables POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_HOST,
#   POSTGRES_PORT, POSTGRES_DB override defaults below.

changeLogFile=changelog/db.changelog-master.yaml
driver=org.postgresql.Driver

# Default: local Docker Postgres (from docker-compose.data.yaml)
url=jdbc:postgresql://${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-conductor}
username=${POSTGRES_USER:-conductor}
password=${POSTGRES_PASSWORD:-conductor}

# Liquibase behaviour
liquibase.hub.mode=off
